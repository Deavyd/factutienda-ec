<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactuTienda</title>
  <style>
    body { margin: 0; font-family: Segoe UI, sans-serif; background: linear-gradient(180deg, #0f172a, #1e293b); color: #fff; display: grid; place-items: center; height: 100vh; }
    .card { width: 340px; text-align: center; }
    .bar { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 999px; overflow: hidden; }
    .fill { width: 60%; height: 100%; background: #22c55e; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0% { width: 20%; } 50% { width: 80%; } 100% { width: 35%; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>FactuTienda EC</h1>
    <p id="msg">Iniciando backend...</p>
    <div class="bar"><div class="fill"></div></div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    if (window.factuElectron?.ipc?.onStatus) {
      window.factuElectron.ipc.onStatus((payload) => {
        if (payload?.message) msg.textContent = payload.message;
      });
    }
  </script>
</body>
</html>
